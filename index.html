<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Pago Bootstrap</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div>
        <div class="bg-light border-bottom p-3">
            <h2 >Pago de ejemplo</h2>
        </div>
        <form>
            <div class="alert alert-danger mb-4" role="alert">
               Faltan algunos campos
            </div>
        <div class="row">
    <div class="col-lg-5 col-md-5 col-sm-12">
      <div class="mb-3">
    <label for="Tarjeta" class="form-label">Tarjeta #</label>
    <input type="text" class="form-control" id="Tarjeta" maxlength="16" placeholder="XXXXXXXXXXXXXXXX" >
    
  </div>
    </div>
    <div class="col-lg-3 col-md-3 col-sm-12">
      <label for="CVC" class="form-label">CVC #</label>
    <input type="number" class="form-control" id="CVC" max="4" placeholder="0000" >
    
    </div>
    <div class="col-lg-4 col-md-4 col-sm-4">
     <label for="cantidad" class="form-label">Cantidad</label>
       
     <p class="d-flex">$<input type="text" class="form-control" id="cantidad"  placeholder="Cantidad" ></p>
    </div>
  </div>
 
<div class="row">
 <div class="col-lg-6 col-md-6 col-sm-12">
   <div class="mb-3">
    <label for="nombre" class="form-label">Nombre</label>
    <input type="text" class="form-control" id="nombre" >
    
  </div>
   <div class="mb-3">
    <label for="ciudad" class="form-label">Ciudad</label>
    <input type="text" class="form-control" id="ciudad" >
 
    <div class="mt-3">
      <p>Aceptamos</p>
    <div class="d-inline-block bg-dark-subtle p-s-1">
     <input type="radio" id="visa"   />
      <label for="visa"><i class="fa-brands fa-cc-visa"></i></label>
      <input type="radio" id="am-expres"  />
      <label for="am-expres"><i class="fa-brands fa-cc-amex"></i></label>
      <input type="radio" id="mastercard"  />
      <label for="mastercard"><i class="fa-brands fa-cc-mastercard"></i></label>
        <input type="radio" id="diners"  />
      <label for="diners"><i class="fa-brands fa-cc-diners-club"></i></label>
    </div>

    
  
  </div>
  </div>
 </div>
<div class="col-lg-6 col-md-6 col-sm-12 mb-3">
  
  <label for="Apellidos" class="form-label">Apellidos</label>
    <input type="text" class="form-control" id="Apellidos" >

         <div class="container mt-3 ">
  <div class="row">
    <div class="col-lg-6 col-md-6 col-sm-12">
      <label for="estado" class="form-label">Comunidad Autonoma</label>
      <select class="form-select form-select mb-3" aria-label=".form-select-lg example" id="estado" placeholder="Comunidad">

        <option selected >Comunidad</option>
  <option value="1">C.Valencia</option>
  <option value="2">Madrid</option>
  <option value="3">Cataluña</option>
  <option value="4">Andalucia</option>

</select>
    </div>
    <div class="col-lg-6 col-md-6 col-sm-12">
       <label for="postal" class="form-label">Codigo Postal</label>
    <input type="text" class="form-control" id="postal" >
    </div>
  
     </div>
   </div>
    <label for="textarea" class="form-label">Mensaje</label>
    <textarea id="textarea" name="textarea" rows="3" class="form-control"></textarea>
   </div>
       
      <footer>
      <div class="bg-light border-bottom  p-3 text-end">
           <input type="reset" class="btn btn-secondary" value="Cancelar" />
           <input type="submit" class="btn btn-primary" value="Enviar" />
        </div>
      </footer>
     
     
     
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
       </form>
      </body>
</html>
